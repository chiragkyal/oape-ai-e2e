apiVersion: v1
kind: ServiceAccount
metadata:
  name: oape-server
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.oape-server: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"oape-server"}}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oape-server
  labels:
    app: oape-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oape-server
  template:
    metadata:
      labels:
        app: oape-server
    spec:
      serviceAccountName: oape-server
      containers:
        - name: oape-server
          image: ghcr.io/shiftweek/oape-ai-e2e:latest
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          envFrom:
            - configMapRef:
                name: oape-server-config
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcloud/application_default_credentials.json
          volumeMounts:
            - name: gcloud-adc
              mountPath: /secrets/gcloud
              readOnly: true
            - name: gh-token-shared
              mountPath: /shared
              readOnly: true
            - name: config
              mountPath: /config
              readOnly: true
        - name: ghtoken-sidecar
          image: ghcr.io/shiftweek/oape-ai-e2e:latest
          command: ["/opt/ghtoken/token-refresh.sh"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: GH_APP_ID
              value: "3065249" # Replace with GitHub App ID if otherwise
            - name: GH_APP_PEM_FILE_PATH
              value: /secrets/gh-app/bot-key.pem
          volumeMounts:
            - name: gh-app-key
              mountPath: /secrets/gh-app
              readOnly: true
            - name: gh-token-shared
              mountPath: /shared
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:v4.21
          imagePullPolicy: IfNotPresent
          args:
            - -provider=openshift
            - -https-address=:8888
            - -http-address=
            - -email-domain=*
            - -upstream=http://localhost:8000
            - -tls-cert=/etc/tls/private/tls.crt
            - -tls-key=/etc/tls/private/tls.key
            - -cookie-secret-file=/etc/proxy/secrets/session_secret
            - -openshift-service-account=oape-server
            - -openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - -skip-auth-regex=^/metrics
          ports:
            - name: oauth-proxy
              containerPort: 8888
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: secret-oape-server-tls
              mountPath: /etc/tls/private
            - name: secret-oape-server-proxy
              mountPath: /etc/proxy/secrets
      volumes:
        - name: gcloud-adc
          secret:
            secretName: gcloud-adc-secret
        - name: gh-app-key
          secret:
            secretName: gh-app-secret
        - name: gh-token-shared
          emptyDir: {}
        - name: config
          configMap:
            name: oape-configs
        - name: secret-oape-server-tls
          secret:
            defaultMode: 420
            secretName: oape-server-tls
        - name: secret-oape-server-proxy
          secret:
            defaultMode: 420
            secretName: oape-server-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: oape-server
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: oape-server-tls
spec:
  selector:
    app: oape-server
  ports:
    - name: proxy
      port: 8000
      protocol: TCP
      targetPort: oauth-proxy
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: oape-server
spec:
  to:
    kind: Service
    name: oape-server
  port:
    targetPort: proxy
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
